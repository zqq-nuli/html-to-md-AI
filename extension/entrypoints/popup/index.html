<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML → MD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="logo">
          <span class="logo-icon">⚡</span>
          <span class="logo-text">html<span class="accent">→</span>md</span>
        </div>
        <div class="header-actions">
          <button id="btn-settings" class="btn-settings" type="button" title="Settings">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
          <span class="badge">WASM</span>
        </div>
      </header>

      <div class="actions">
        <button id="btn-page" class="btn btn-primary" type="button">
          <span class="btn-icon">📄</span>
          <span data-i18n="convertPage"></span>
        </button>
        <button id="btn-selection" class="btn btn-secondary" type="button">
          <span class="btn-icon">✂️</span>
          <span data-i18n="convertSelection"></span>
        </button>
      </div>

      <div id="status" class="status hidden"></div>

      <div id="output-area" class="output-area hidden">
        <div class="output-header">
          <span id="output-title" class="output-title"></span>
          <div class="output-actions">
            <button id="btn-copy" class="btn-icon-action" title="Copy to clipboard">📋</button>
            <button id="btn-download" class="btn-icon-action" title="Download .md file">💾</button>
          </div>
        </div>
        <textarea id="output" class="output" readonly spellcheck="false"></textarea>
        <div class="output-meta">
          <span id="char-count"></span>
          <span id="line-count"></span>
        </div>
      </div>

      <footer class="footer">
        <span class="shortcut-key">Alt+M</span> <span data-i18n="quickConvert"></span>
      </footer>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
